name: Deploy User Service

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/user-service/**'

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: |
          cd Backend
          
          cd commonjwt
          mvn clean install -DskipTests
          cd ..
          
          cd user-service
          mvn clean package -DskipTests

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
          --build-arg SERVICE_NAME=user-service \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/user-service \
          -f Backend/user-service/Dockerfile \
          ./Backend
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/user-service

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop user-service || true
            docker rm user-service || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/user-service
            docker run -d \
            -p 8082:8080 \
            --name user-service \
            --env-file .env \
            ${{ secrets.DOCKERHUB_USERNAME }}/user-service