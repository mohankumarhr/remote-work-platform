name: Deploy Auth Service

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/auth-service/**'

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: |
          cd Backend/auth-service
          mvn clean package -DskipTests

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service ./Backend/auth-service

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth-service

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop auth-service || true
            docker rm auth-service || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/auth-service
            docker run -d -p 8081:8080 --name auth-service ${{ secrets.DOCKERHUB_USERNAME }}/auth-service